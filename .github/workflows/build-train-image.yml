name: build-train-image

# Builds the pinned ACE-Step LoKr training image on native x86 CI and pushes it
# to GHCR, so any container-first GPU host (RunPod, Vast, Modal) can pull it.
# No local Docker/disk needed. Trigger manually, or on changes under docker/.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "docker/**"
      - ".github/workflows/build-train-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/electronic-lora-train
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Pushed image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Make the GHCR package public (Packages -> settings) so RunPod can pull it without registry creds." >> "$GITHUB_STEP_SUMMARY"
